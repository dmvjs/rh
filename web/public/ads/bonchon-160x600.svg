<svg xmlns="http://www.w3.org/2000/svg" width="160" height="600" viewBox="0 0 160 600">
  <rect width="160" height="600" fill="#f7f7f5"/>
  <rect width="160" height="600" fill="none" stroke="#e2e2de" stroke-width="1"/>

  <!-- Red header block -->
  <rect x="1" y="1" width="158" height="220" fill="#d71920"/>

  <!-- Bonchon logo centered in header: 108x133 natural, display at 80x99 -->
  <image href="data:image/png;base64," x="40" y="28" width="80" height="99"/>

  <!-- Flavor pills -->
  <rect x="10" y="146" width="64" height="22" rx="11" fill="rgba(255,255,255,0.18)"/>
  <text x="42" y="161" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Soy Garlic</text>

  <rect x="84" y="146" width="66" height="22" rx="11" fill="rgba(255,255,255,0.18)"/>
  <text x="117" y="161" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Spicy</text>

  <!-- Subhead in header -->
  <text x="80" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.65)" letter-spacing="0.12em" text-anchor="middle">KOREAN FRIED CHICKEN</text>

  <!-- Headline -->
  <text x="80" y="256" font-family="Georgia,'Times New Roman',serif" font-size="18" fill="#1a1a18" text-anchor="middle">Crunch Out Loud.</text>

  <text x="80" y="286" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#6b6b65" text-anchor="middle">Double-fried for that</text>
  <text x="80" y="302" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#6b6b65" text-anchor="middle">signature crunch.</text>

  <!-- Divider -->
  <line x1="30" y1="322" x2="130" y2="322" stroke="#e2e2de" stroke-width="1"/>

  <!-- Locations -->
  <text x="80" y="346" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="600" fill="#1a1a18" text-anchor="middle">Nearby locations:</text>
  <text x="80" y="364" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6b6b65" text-anchor="middle">Arlington · Centreville</text>
  <text x="80" y="380" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6b6b65" text-anchor="middle">Fairfax · Rockville</text>

  <!-- Divider -->
  <line x1="30" y1="398" x2="130" y2="398" stroke="#e2e2de" stroke-width="1"/>

  <!-- Dine in / Delivery -->
  <text x="80" y="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" fill="#6b6b65" text-anchor="middle">Dine in · Takeout · Delivery</text>

  <!-- CTA -->
  <rect x="16" y="442" width="128" height="36" rx="5" fill="#d71920"/>
  <text x="80" y="465" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Order now →</text>

  <!-- Sponsored -->
  <text x="80" y="590" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#b0b0a8" text-anchor="middle">sponsored</text>
</svg>
