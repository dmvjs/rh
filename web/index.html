<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ridgelea Hills</title>
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <div id="ad-leaderboard" style="display:none;margin:16px 0 0;"></div>
      <div class="news-layout">
        <div id="news-grid" style="margin-top:24px;"></div>
        <aside>
          <div id="alerts-section" style="display:none;"></div>
          <a id="weather-widget" href="/weather/" class="wx-widget wx-widget-sidebar"><span class="skeleton" style="display:block;height:24px;width:80%;border-radius:4px;"></span></a>
          <div id="neighborhood-section" style="display:none;">
            <h2 style="font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:24px 0 12px;">In the Neighborhood</h2>
            <div id="neighborhood-list"></div>
          </div>
          <div id="ad-skyscraper" style="display:none;margin:16px 0;"></div>
        </aside>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script type="module" src="/src/news.js"></script>
</body>
</html>
