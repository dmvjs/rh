name            = "rh-api"
account_id      = "5e82bc3eb8a1a178668aeec45ac7d996"
main            = "src/index.js"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding      = "DB"
database_name = "rh"
database_id  = "5051f1e9-6dc2-42ae-97e5-c9ea8e8f5058"

[[kv_namespaces]]
binding = "CACHE"
id     = "5df8dfcb8fce42428ffd5c02b8beb407"

[vars]
WEB_ORIGIN = "https://ridgeleahills.com"

[triggers]
crons = ["*/15 * * * *"]  # every 15 min — keeps news cache warm

# Secrets (set via `wrangler secret put <NAME>`):
#   JWT_SECRET
#   FORMSPREE_URL
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION
#   S3_BUCKET
